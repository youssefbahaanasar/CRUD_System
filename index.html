<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./CSS/style.css" />
    <link rel="stylesheet" href="./CSS/sweetalert2.min.css">
    <link rel="stylesheet" href="./CSS/all.min.css">
    <title>Store</title>
  </head>
  <body class="container mx-auto py-10 px-2">
    <h1 class="text-2xl sm:text-4xl max-w-fit mx-auto font-semibold ">Store Management System </h1>
      <form action="" class="flex flex-col gap-5 items-center w-4/5 md:w-2/3 mx-auto my-10">
        
        <div class="relative flex flex-col w-full">
          <label for="productName" class="text-md text-black/70 font-medium justify-items-start ">Product Name:</label>
          <input required type="text" id="productName" name="productName" class="text-lg outline-none font-mono  border border-black/50 rounded-xl w-full p-2 h-10 focus:border-black/60" />
        </div>
        
        <div class="flex flex-col w-full">
          <label for="productPrice" class="text-md text-black/70 font-semibold justify-items-start ">Product Price:</label>
          <div class="flex">
            <input required type="number" id="productPrice" name="productPrice" class="text-lg outline-none font-mono  border border-e-0 rounded-e-none border-black/50 rounded-xl w-full p-2 h-10 focus:border-black/60" />
            <select name="currency" id="currency" class="border font-mono border-black/50 rounded-xl rounded-s-none w-3/6 md:w-1/6 p-1 h-10 ">
              <option value="LE"selected>£ (Egp)</option>
              <option value="$">$ (Usd)</option>
            </select>
          </div>
        </div>
        
        <div class="flex flex-col w-full">
          <label for="productCate" class="text-md text-black/70 font-semibold justify-items-start ">Product Category:</label>
          <select required name="productCate" id="productCate" class="border border-black/50 rounded-xl w-full p-1 h-10 ">
            <option value="electronics"selected>Electronics</option>
            <option value="clothes">Clothes</option>
            <option value="accessories">Accessories</option>
          </select>
          <!-- <input type="text" id="productCate" name="productCate" class="text-lg outline-none font-mono  border border-black/50 rounded-xl w-full p-2 h-8 focus:border-black/60" /> -->
        </div>

        <div class="flex flex-col w-full">
          <label for="productDesc" class="text-md text-black/70 font-semibold justify-items-start ">Product Description:</label>
          <textarea required id="productDesc" name="productDesc" class="text-lg outline-none font-mono  border border-black/50 rounded-xl w-full p-2 min-h-14 focus:border-black/60"></textarea>
        </div>

        <div class="flex flex-col w-full sm:w-2/3 self-start">
          <label for="productImage" class="text-md text-black/70 font-semibold justify-items-start ">Product Image:</label>
          <input required type="file" id="productImage" name="productImage" class="text-md text-black/80 file:border-e file:cursor-pointer file:p-0.5  hover:file:bg-black/10 border border-black/60 rounded-lg " />
        </div>
          <div class="w-full">
            <button id="addBtn" class="inline border  px-4 py-1 text-lg bg-blue-500 text-white rounded-lg cursor-pointer hover:bg-blue-600/90">Create Product</button>
            <button id="updateBtn" class="hidden border  px-4 py-1 text-lg bg-amber-500 text-white rounded-lg cursor-pointer hover:bg-amber-600/80">Update Product</button>
          </div>
      </form>
      <div class="w-3/4 md:w-3/4 mx-auto  mb-10 ">
        <div class="relative w-full flex">
          <div class="w-4/12 sm:w-3/12 lg:w-2/12 xl:w-1/12 border border-black/40 text-black/70 rounded-s-4xl border-e-0 flex items-center justify-center font-semibold space-x-0.5"> <span>Serach</span><i class="fa-brands scale-110 fa-sistrix"></i></div>
          <input id="search" class=" mx-auto w-8/12 sm:w-9/12 font-mono lg:w-10/12 xl:w-11/12 border text-lg  border-black/40 rounded-e-4xl text-black outline-0  p-3 px-3"/>
          <button id="filterBtn" class="w-13 h-13 border border-white rounded-full hover:bg-blue-600/85 bg-blue-500  cursor-pointer absolute top-px right-0.5"> <i class="fa-solid fa-sliders text-white scale-120" ></i></button>
          
          <div id="filterDiv" class="absolute border border-gray-200 transition-all duration-500 bg-white top-[102%] right-0 max-h-0  overflow-hidden invisible shadow-md   md:w-sm p-2 rounded-sm flex flex-col">
            <div class="flex flex-col gap-2 mb-4">
              <span class="font-medium" >Price:</span>
              <div class="ms-3">
                <input class="border outline-0 ps-2 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 border-gray-300 py-2 rounded-sm" placeholder="Min" id="filterMinPrice" max="999998" min="99" type="number">
                <input class="border outline-0 ps-2 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 border-gray-300 py-2 rounded-sm " placeholder="Max" id="filterMaxPrice" max="999999" min="100" type="number">
              </div>
            </div>
          <div class="flex flex-col gap-2">
            <span class="font-medium" >Categorey:</span>
            <div class="flex flex-col ms-3">
              <div class="">
                <input id="all" type="radio" name="searchCate" value="all" checked>
                <label for="all">All</label>
              </div>
              <div class="">
                <input id="electronics" type="radio" name="searchCate" value="electronics">
                <label for="electronics">Electronics</label>
              </div>
              <div class="">
                <input id="clothes" type="radio" name="searchCate" value="clothes">
                <label for="clothes">Clothes</label>
              </div>
              <div class="">
                <input id="accessories" type="radio" name="searchCate" value="accessories">
                <label for="accessories">Accessories</label>
              </div>
              
            </div>
          </div>
          <div class="flex justify-between items-center w-full">
            <button id="clearBtn" class=" ms-3 text-black underline hover:text-blue-500 cursor-pointer">Clear</button>
            <button id="applyFilter" class=" self-end px-2 bg-blue-500 text-white rounded-lg py-1 mt-2 w-1/4 shadow-md shadow-indigo-500/50 cursor-pointer hover:bg-blue-600/85">Apply</button>
          </div>
        </div>
        </div>
      </div>
      <div class="grid grid-cols-12 gap-2" id="productBox">
          
      </div>
      <script src="./Script/sweetalert2.all.min.js"></script>
      <script src="./Script/script.js"></script>
  </body>
</html>
